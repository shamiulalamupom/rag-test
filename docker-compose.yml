services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_pg
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - rag_pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - rag_ollama_data:/root/.ollama
volumes:
  rag_pg_data:
  rag_ollama_data:
